<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>oeoam ✦ ɢʟᴏᴇᴏᴀᴍ</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400&family=Noto+Sans+TC:wght@300;500&display=swap" rel="stylesheet">

    <style>
        @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

body {
    animation: fadeIn 1.2s ease-out; /* 整個頁面進場動畫 */
}

/* 讓所有屬性變化都帶有轉場 */
* {
    transition: background-color 0.4s ease, color 0.4s ease, border-color 0.4s ease, transform 0.3s ease;
}

        :root {
    /* 深色模式 (預設) */
    --bg-color: #121212;
    --text-color: #d1d1d1;
    --border-color: #333333;
}

[data-theme="light"] {
    /* 淺色模式 */
    --bg-color: #f5f5f5;
    --text-color: #333333;
    --border-color: #dddddd;
}


        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 60px 20px; /* 增加上下留白 */
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            letter-spacing: 0.12em;
        }

        /* 標題區塊 */
        .header { text-align: center; margin-bottom: 40px; }
        h1 { font-weight: 200; font-size: 1.8rem; color: var(--text-main); margin: 0; text-transform: uppercase; }
        .subtitle { font-size: 0.75rem; opacity: 0.5; margin-top: 10px; }

        /* 連結區塊 */
        .links-container { width: 100%; max-width: 320px; display: flex; flex-direction: column; gap: 12px; margin-bottom: 60px; }
        .link-card {
            display: block; padding: 14px; text-align: center; text-decoration: none;
            color: var(--text-main); border: 1px solid var(--border-color); border-radius: 4px;
            font-size: 0.85rem; transition: all 0.3s ease; background-color: rgba(255, 255, 255, 0.02);
        }
        .link-card:hover { border-color: #888; background-color: rgba(255, 255, 255, 0.05); color: var(--accent-glow); transform: translateY(-2px); }

        /* 作品集畫廊區塊 */
        .portfolio-title { font-size: 0.9rem; margin-bottom: 20px; opacity: 0.8; }
        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 900px;
            margin-bottom: 80px;
        }
        .work-item {
    position: relative; /* 建立座標基準 */
    aspect-ratio: 1 / 1;
    background-color: #1a1a1a;
    border: 1px solid var(--border-color);
    overflow: hidden;
    display: flex; 
    justify-content: center; 
    align-items: center;
    color: var(--text-dim); 
    font-size: 0.7rem;
    position: relative; /* 為了之後疊加圖片效果 */
    transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); /* 平滑的過渡 */
    cursor: pointer;
}

/* 建立隱形遮罩 */
.work-item::after {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 10; /* 確保遮罩在圖片上方 */
    background: rgba(0,0,0,0); /* 完全透明 */
}

.work-item:hover {
    border-color: var(--accent-glow); /* 懸停時邊框變白 */
    box-shadow: 0 0 15px rgba(255, 255, 255, 0.05); /* 微弱的發光感 */
}
        img {
    -webkit-user-select: none; /* Chrome, Safari */
    -ms-user-select: none;     /* IE/Edge */
    user-select: none;         /* 標準寫法 */
    -webkit-touch-callout: none; /* 禁用 iOS 長按選單 */
    pointer-events: none;      /* 讓滑鼠事件直接穿透圖片（配合遮罩使用） */
}


        /* 聯絡表單區塊 */
        .contact-section { width: 100%; max-width: 320px; text-align: center; }
        .contact-section h2 { font-weight:200 ; font-size: 0.9rem; margin-bottom: 20px; }
        
        input, textarea {
            width: 100%; box-sizing: border-box; background: transparent;
            border: 1px solid var(--border-color); color: var(--text-main);
            padding: 12px; margin-bottom: 12px; font-family: inherit; font-size: 0.85rem;
        }
        textarea { height: 100px; resize: none; }
        input:focus, textarea:focus { outline: none; border-color: #666; }

        button {
            width: 100%; background: var(--text-main); color: var(--bg-dark);
            border: none; padding: 12px; cursor: pointer; letter-spacing: 0.2em; transition: 0.3s;
        }
        button:hover { background: var(--accent-glow); }

        footer { margin-top: 60px; font-size: 0.7rem; opacity: 0.3; }
    </style>
</head>
<body>

    <div class="header">
        <h1>ɢʟᴏᴇᴏᴀᴍ</h1>
        <div class="subtitle">淨｜Kiyo ✦ 創作收納</div>
        <button id="theme-toggle" style="background:transparent; color:var(--text-color); border:1px solid var(--border-color); width:auto; padding:5px 10px; font-size:0.7rem; margin-top:10px;">切換明暗</button>

    </div>

    <div class="links-container">
        <a href="https://twitter.com/kiyo_ink" class="link-card" target="_blank">X (Twitter) ｜ 商務與主帳</a>
        <a href="https://twitter.com/oeoam" class="link-card" target="_blank">X (Sub) ｜ 靈魂碎片</a>
        <a href="https://www.instagram.com/_oeoam" class="link-card" target="_blank">Instagram ｜ 作品精選</a>
        <a href="https://www.twitch.tv/oeoam" class="link-card" target="_blank">Twitch ｜ 實況內容</a>
        <a href="https://www.youtube.com/@oeoam" class="link-card" target="_blank">YouTube ｜ 實況存檔</a>
    </div>

    <div class="portfolio-title">SELECTED WORKS</div>
    <div class="portfolio-grid">
        <div class="work-item">
    <img src="assets/img/0821.png" alt="雙人Q版" style="width: 100%; height: 100%; object-fit: cover;">
</div>
        <div class="work-item">IMAGE_STORAGE_02</div>
        <div class="work-item">IMAGE_STORAGE_03</div>
    </div>

    <section class="contact-section">
        <h2>委託洽談 / BUSINESS</h2>
        <form action="https://formspree.io/f/mkokkqnj" method="POST">
            <input type="email" name="email" placeholder="您的電子信箱" required>
            <textarea name="message" placeholder="委託內容或想說的話..." required></textarea>
            <button type="submit">發送訊息</button>
        </form>
    </section>

    <footer>© oeoam</footer>
<script>
    const toggleBtn = document.getElementById('theme-toggle');
    const currentTheme = localStorage.getItem('theme');

    // 檢查上次存儲的主題
    if (currentTheme) {
        document.documentElement.setAttribute('data-theme', currentTheme);
    }

    toggleBtn.addEventListener('click', () => {
        let theme = document.documentElement.getAttribute('data-theme');
        if (theme === 'light') {
            document.documentElement.removeAttribute('data-theme');
            localStorage.setItem('theme', 'dark');
        } else {
            document.documentElement.setAttribute('data-theme', 'light');
            localStorage.setItem('theme', 'light');
        }
    });
    // 禁止全站右鍵選單
document.addEventListener('contextmenu', event => event.preventDefault());

// 禁止圖片拖拽
document.addEventListener('dragstart', event => {
    if (event.target.tagName === 'IMG') {
        event.preventDefault();
    }
});

</script>

</body>
</html>
