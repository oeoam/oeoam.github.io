<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>oeoam ✦ ɢʟᴏᴇᴏᴀᴍ</title>
    <style>
        /* 這裡定義妳網頁的視覺規則 */
        body {
            background-color: #121212; /* 幽暗的背景 */
            color: #a0a0a0; /* 清冷的灰色文字 */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Inter', 'Helvetica Neue', sans-serif;
            letter-spacing: 0.15em;
        }

        h1 {
            font-weight: 200;
            font-size: 1.5rem;
            color: #e0e0e0;
            margin-bottom: 0.5rem;
        }

        .status {
            font-size: 0.8rem;
            opacity: 0.6;
        }

        /* 簡單的裝飾線，增加收納感 */
        .line {
            width: 30px;
            height: 1px;
            background-color: #404040;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <h1>ɢʟᴏᴇᴏᴀᴍ</h1>
    <div class="line"></div>
    <div class="status">正在收納墨跡中...</div>
</body>
</html>
