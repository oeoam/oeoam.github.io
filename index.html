<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>oeoam ✦ ɢʟᴏᴇᴏᴀᴍ</title>
    <style>
        body {
            background-color: #121212;
            color: #d1d1d1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            letter-spacing: 0.12em;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-weight: 200;
            font-size: 1.8rem;
            color: #ffffff;
            margin: 0;
            text-transform: uppercase; /* 確保全大寫視覺統一 */
        }

        .subtitle {
            font-size: 0.75rem;
            opacity: 0.5;
            margin-top: 10px;
        }

        .links-container {
            width: 100%;
            max-width: 300px;
            display: flex;
            flex-direction: column;
            gap: 12px; /* 稍微縮小間距，視覺更緊湊 */
        }

        .link-card {
            display: block;
            padding: 14px;
            text-align: center;
            text-decoration: none;
            color: #d1d1d1;
            border: 1px solid #333;
            border-radius: 4px;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            background-color: rgba(255, 255, 255, 0.02);
        }

        .link-card:hover {
            border-color: #888;
            background-color: rgba(255, 255, 255, 0.05);
            color: #ffffff;
            transform: translateY(-2px);
        }

        .contact-info {
            margin-top: 50px;
            text-align: center;
            font-size: 0.75rem;
            border-top: 1px solid #222;
            padding-top: 30px;
            width: 220px; /* 稍微加寬，避免信箱折行 */
        }

        .contact-item {
            margin-bottom: 8px;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>ɢʟᴏᴇᴏᴀᴍ</h1>
        <div class="subtitle">淨｜Kiyo ✦ 創作收納</div>
    </div>

    <div class="links-container">
        <a href="https://twitter.com/kiyo_ink" class="link-card" target="_blank">X (Twitter) ｜ 商務與主帳</a>
        <a href="https://twitter.com/oeoam" class="link-card" target="_blank">X (Sub) ｜ 靈魂碎片</a>
        <a href="https://www.instagram.com/_oeoam" class="link-card" target="_blank">Instagram ｜ 作品精選</a>
        <a href="https://www.twitch.tv/oeoam" class="link-card" target="_blank">Twitch ｜ 實況內容</a>
        <a href="https://www.youtube.com/@oeoam" class="link-card" target="_blank">YouTube ｜ 實況存檔</a>
    </div>

    <div class="contact-info">
        <div class="contact-item">委託洽談 / Business</div>
        <div class="contact-item" style="color: #ffffff; letter-spacing: 0.05em;">ruitcase@gmail.com</div>
        <div class="subtitle" style="margin-top: 20px; opacity: 0.3;">© oeoam</div>
    </div>

</body>
</html>
